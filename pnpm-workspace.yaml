packages:
  - "apps/*"
  - "config/*"
  - "packages/*"

# Don't install packages that are less than 6h old
# This reduces the risk of installing compromised packages.
# In most cases, malicious releases are discovered and removed from the registry
# within an hour.
# see: https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 360

minimumReleaseAgeExclude:
  - "@ngrok/remark-mdx-github-alerts"
  - "@ngrok/remark-mdx-no-paragraph-wrap"
  - "@types/react"
  - "@types/react-dom"
  - "react"
  - "react-dom"
  - "typescript"

catalog:
  "@phosphor-icons/react": "2.1.10"
  "@testing-library/dom": "10.4.1"
  "@testing-library/jest-dom": "6.9.1"
  "@testing-library/react": "16.3.2"
  "@types/node": "24.13.3"
  "@tailwindcss/vite": "4.3.3"
  "@vitest/browser-playwright": "4.1.10"
  "happy-dom": "20.10.6"
  "oxc-parser": "0.140.0"
  "playwright": "1.61.1"
  "playwright-core": "1.61.1"
  "@tsdown/css": "0.22.13"
  "tailwindcss": "4.3.3"
  "tsdown": "0.22.9"
  "tsx": "4.23.1"
  "typescript": "7.0.2"
  "vite": "8.1.5"

overrides:
  "@types/node": "catalog:"
  "@mjackson/node-fetch-server": "npm:@remix-run/node-fetch-server@0.10.0"
  "ajv": ">=8.20.0"
  "cookie": ">=1.1.1"
  "esbuild": ">=0.28.1"
  "playwright": "catalog:"
  "playwright-core": "catalog:"
  "react": "19.2.7"
  "react-dom": "19.2.7"
  # Bumps the only consumer of vulnerable js-yaml 3.x (CVE-2026-53550) up to a
  # release that depends on patched js-yaml ^4. Capped to 2.x: 3.x is ESM-only
  # and drops the default/.sync exports that @manypkg/get-packages@1.1.3 requires.
  "read-yaml-file": "2.1.0"
  "uuid": ">=14.0.0"
    
allowBuilds:
  "esbuild": true
  "@tailwindcss/oxide": true
